services:
  ardupilot_ros:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - USERNAME=ros
        - USER_UID=1000
        - USER_GID=1000
    container_name: ardupilot_ros
    environment:
      - DISPLAY=:11
      - QT_X11_NO_MITSHM=1
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - ~/.Xauthority:/home/ros/.Xauthority
      - ./src:/tmp/local_src
    devices:
      - /dev/dri:/dev/dri
    network_mode: host
    privileged: true
    stdin_open: true
    tty: true
    working_dir: /home/ros/ros2_ws
    entrypoint: ["/bin/bash", "/entrypoint.sh"]
    command: ["sleep", "infinity"]
